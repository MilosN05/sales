# This is a basic workflow to help you get started with Actions

name: workflow_checker
run-name: ${{ github.actor }} pokušava da ubaci određeni fajl (*POKRENUT WORKFLOW_CHECKER*).

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  csv_checker:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Proveri_repozitorijum
        uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Run Great Expectations script
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instaliraj_zavisnosti
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 

      # Runs a set of commands using the runners shell
      - name: Pokreni_skriptu_za_csv
        run: |
          files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          echo "Changed files:"
          echo "$files"
          
          has_csv=false
          
          for file in $files; do
            if [[ "$file" == data/*.csv ]]; then
              has_csv=true
              echo "🔎 Validiram: $file"
              python main.py "$file"
          
              if [ $? -ne 0 ]; then
                echo "❌ FAIL: $file nije validan"
                exit 1
              fi
          
            else
              echo "❌ NIJE DOZVOLJENO: $file"
              exit 1
            fi
          done
          
          echo "✅ OK"
  
